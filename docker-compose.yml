services:
  frontend:
    build:
      context: ./frontend
      args:
        # Override for production: use NEXT_PUBLIC_BACKEND_URL from .env (e.g. https://tu-dominio.duckdns.org)
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:5001}
    container_name: lixylearning-frontend
    ports:
      - "3000:3000"
    restart: always
    env_file:
      - .env
  backend:
    build:
      context: ./backend
      args:
        NEXT_PUBLIC_FRONTEND_URLS: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:3000}
    container_name: lixylearning-backend
    ports:
      - "5001:5000"
    env_file:
      - .env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    build: ./db
    container_name: lixylearning-postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      # PostgreSQL 18+ requiere montar en /var/lib/postgresql (no /data)
      - postgres-data:/var/lib/postgresql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lixylearning_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    

volumes:
  postgres-data:

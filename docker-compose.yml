services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:5001}
        NEXT_PUBLIC_USE_COGNITO: ${NEXT_PUBLIC_USE_COGNITO:-false}
        NEXT_PUBLIC_COGNITO_REGION: ${NEXT_PUBLIC_COGNITO_REGION:-}
        NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${NEXT_PUBLIC_COGNITO_USER_POOL_ID:-}
        NEXT_PUBLIC_COGNITO_CLIENT_ID: ${NEXT_PUBLIC_COGNITO_CLIENT_ID:-}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-}
    container_name: lixylearning-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    restart: always
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 1024M
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        NEXT_PUBLIC_FRONTEND_URLS: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:3000}
    container_name: lixylearning-backend
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    build: ./db
    container_name: lixylearning-postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      # PostgreSQL 18+ requiere montar en /var/lib/postgresql (no /data)
      - postgres-data:/var/lib/postgresql
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lixylearning_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    

volumes:
  postgres-data:
